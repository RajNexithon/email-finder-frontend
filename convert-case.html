<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Convert Case Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

:root{
--bg:#f8fafc;
--surface:rgba(255,255,255,.75);
--text:#111827;
--muted:#6b7280;
--border:#e5e7eb;
--primary:#4f46e5;
--secondary:#7c3aed;
--success:#10b981;
}

body.dark{
--bg:#0f172a;
--surface:rgba(30,41,59,.85);
--text:#f8fafc;
--muted:#94a3b8;
--border:#334155;
}

body{
font-family:Inter,sans-serif;
background:
radial-gradient(circle at top left,#bfdbfe 0%,transparent 40%),
radial-gradient(circle at bottom right,#ddd6fe 0%,transparent 40%),
var(--bg);
color:var(--text);
min-height:100vh;
padding:30px 16px;
transition:.3s;
}

.container{
max-width:1000px;
margin:auto;
}

.topbar{
display:flex;
justify-content:flex-end;
margin-bottom:10px;
}

.toggle{
border:none;
border-radius:12px;
padding:10px 14px;
cursor:pointer;
color:#fff;
background:linear-gradient(135deg,var(--primary),var(--secondary));
}

.nav-card{
background:var(--surface);
backdrop-filter:blur(20px);
border:1px solid var(--border);
border-radius:20px;
padding:15px;
margin-bottom:20px;
box-shadow:0 10px 20px rgba(0,0,0,.05);
}

.nav-links{
display:flex;
justify-content:center;
gap:12px;
flex-wrap:wrap;
}

.nav-links a{
text-decoration:none;
padding:10px 16px;
border-radius:12px;
border:1px solid var(--border);
color:var(--text);
font-weight:600;
transition:.3s;
}

.nav-links a:hover{
background:linear-gradient(
135deg,
var(--primary),
var(--secondary)
);
color:#fff;
border-color:transparent;
}

.header{
text-align:center;
margin-bottom:25px;
}

.badge{
display:inline-block;
padding:8px 14px;
border-radius:999px;
background:rgba(79,70,229,.1);
color:var(--primary);
font-size:12px;
font-weight:700;
margin-bottom:12px;
}

h1{
font-size:3rem;
}

.subtitle{
color:var(--muted);
margin-top:8px;
}

.card{
background:var(--surface);
backdrop-filter:blur(20px);
border:1px solid var(--border);
border-radius:24px;
padding:24px;
box-shadow:0 20px 40px rgba(0,0,0,.08);
}

textarea{
width:100%;
height:320px;
padding:18px;
border-radius:18px;
border:1px solid var(--border);
background:transparent;
color:var(--text);
font-size:16px;
resize:vertical;
}

textarea:focus{
outline:none;
border-color:var(--primary);
}

.stats{
display:flex;
justify-content:flex-end;
gap:20px;
margin-top:12px;
color:var(--muted);
font-size:14px;
flex-wrap:wrap;
}

.actions{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:10px;
margin-top:20px;
}

.btn{
border:none;
padding:14px;
border-radius:14px;
cursor:pointer;
font-weight:700;
color:white;
background:linear-gradient(
135deg,
var(--primary),
var(--secondary)
);
}

.utility{
margin-top:15px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:10px;
}

.utility button{
border:none;
padding:12px;
border-radius:12px;
cursor:pointer;
font-weight:600;
background:var(--surface);
border:1px solid var(--border);
color:var(--text);
}

@media(max-width:700px){

h1{
font-size:2rem;
}

.stats{
justify-content:center;
}

}
</style>
</head>

<body>

<div class="container">

<div class="topbar">
<button class="toggle"
onclick="document.body.classList.toggle('dark')">
🌙 Toggle Theme
</button>
</div>

<div class="nav-card">
<div class="nav-links">
<a href="index.html">📧 Email Finder</a>
<a href="convert-case.html">🔤 Convert Case</a>
<a href="numbers-to-words.html">🔢 Numbers to Words</a>
</div>
</div>

<div class="header">
<div class="badge">
Made with ❤️ by Nexithon Night Shift
</div>

<h1>Convert Case Pro</h1>

<p class="subtitle">
Instantly convert your text to uppercase,
lowercase, title case and more.
</p>
</div>

<div class="card">

<textarea
id="textInput"
placeholder="Type or paste your content here..."
></textarea>

<div class="stats">
<div>Characters: <span id="chars">0</span></div>
<div>Words: <span id="words">0</span></div>
<div>Lines: <span id="lines">0</span></div>
</div>

<div class="actions">

<button class="btn" onclick="sentenceCase()">
Sentence Case
</button>

<button class="btn" onclick="lowerCase()">
lower case
</button>

<button class="btn" onclick="upperCase()">
UPPER CASE
</button>

<button class="btn" onclick="capitalizedCase()">
Capitalized Case
</button>

<button class="btn" onclick="titleCase()">
Title Case
</button>

<button class="btn" onclick="alternatingCase()">
aLtErNaTiNg Case
</button>

<button class="btn" onclick="inverseCase()">
InVeRsE Case
</button>

</div>

<div class="utility">

<button onclick="copyText()">
📋 Copy Text
</button>

<button onclick="downloadText()">
⬇ Download TXT
</button>

<button onclick="clearText()">
🗑 Clear Text
</button>

</div>

</div>

</div>

<script>

const textInput=document.getElementById('textInput');

textInput.addEventListener('input',updateStats);

function updateStats(){

const text=textInput.value;

document.getElementById('chars').innerText=text.length;

document.getElementById('words').innerText=
text.trim()===''
? 0
: text.trim().split(/\s+/).length;

document.getElementById('lines').innerText=
text===''
? 0
: text.split('\n').length;

}

function sentenceCase(){

let text=textInput.value.toLowerCase();

text=text.charAt(0).toUpperCase()+text.slice(1);

textInput.value=text;

updateStats();

}

function lowerCase(){

textInput.value=textInput.value.toLowerCase();

updateStats();

}

function upperCase(){

textInput.value=textInput.value.toUpperCase();

updateStats();

}

function capitalizedCase(){

textInput.value=textInput.value
.toLowerCase()
.replace(/\b\w/g,l=>l.toUpperCase());

updateStats();

}

function titleCase(){

textInput.value=textInput.value
.toLowerCase()
.replace(/\b\w/g,l=>l.toUpperCase());

updateStats();

}

function alternatingCase(){

let result='';

for(let i=0;i<textInput.value.length;i++){

result+=i%2===0
? textInput.value[i].toLowerCase()
: textInput.value[i].toUpperCase();

}

textInput.value=result;

updateStats();

}

function inverseCase(){

let result='';

for(let char of textInput.value){

result+=char===char.toUpperCase()
? char.toLowerCase()
: char.toUpperCase();

}

textInput.value=result;

updateStats();

}

function copyText(){

navigator.clipboard.writeText(textInput.value);

}

function clearText(){

textInput.value='';

updateStats();

}

function downloadText(){

const blob=new Blob(
[textInput.value],
{type:'text/plain'}
);

const a=document.createElement('a');

a.href=URL.createObjectURL(blob);

a.download='converted-text.txt';

a.click();

}

updateStats();

</script>

</body>
</html>
