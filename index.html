
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Email Finder Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#f8fafc;
--surface:rgba(255,255,255,.75);
--text:#111827;
--muted:#6b7280;
--border:#e5e7eb;
--primary:#4f46e5;
--secondary:#7c3aed;
--success:#10b981;
}
body.dark{
--bg:#0f172a;
--surface:rgba(30,41,59,.85);
--text:#f8fafc;
--muted:#94a3b8;
--border:#334155;
}
body{
font-family:Inter,sans-serif;
background:
radial-gradient(circle at top left,#bfdbfe 0%,transparent 40%),
radial-gradient(circle at bottom right,#ddd6fe 0%,transparent 40%),
var(--bg);
color:var(--text);
min-height:100vh;
padding:30px 16px;
transition:.3s;
}
.container{max-width:900px;margin:auto}
.header{text-align:center;margin-bottom:25px}
.badge{
display:inline-block;padding:8px 14px;border-radius:999px;
background:rgba(79,70,229,.1);color:var(--primary);
font-size:12px;font-weight:700;margin-bottom:12px
}
h1{font-size:3rem}
.subtitle{color:var(--muted);margin-top:8px}
.topbar{display:flex;justify-content:flex-end;margin-bottom:10px}
.toggle{
border:none;border-radius:12px;padding:10px 14px;
cursor:pointer;color:#fff;
background:linear-gradient(135deg,var(--primary),var(--secondary));
}
.card{
background:var(--surface);
backdrop-filter:blur(20px);
border:1px solid var(--border);
border-radius:24px;
padding:24px;
box-shadow:0 20px 40px rgba(0,0,0,.08);
}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:15px}
.full{grid-column:1/-1}
label{display:block;margin-bottom:6px;font-size:13px;color:var(--muted)}
input{
width:100%;padding:14px;border-radius:14px;
border:1px solid var(--border);
background:transparent;color:var(--text);
}
input:focus{outline:none;border-color:var(--primary)}
.btn{
width:100%;margin-top:18px;padding:15px;
border:none;border-radius:14px;color:#fff;
font-weight:700;cursor:pointer;
background:linear-gradient(135deg,var(--primary),var(--secondary));
}
.stats{
display:none;
grid-template-columns:repeat(3,1fr);
gap:12px;margin-top:20px;
}
.stat{
background:var(--surface);
border:1px solid var(--border);
border-radius:16px;padding:16px;text-align:center;
}
.results{margin-top:20px}
.email-row{
display:flex;justify-content:space-between;align-items:center;
padding:14px;margin-bottom:10px;
background:var(--surface);
border:1px solid var(--border);
border-radius:14px;
}
.email-row:hover{transform:translateY(-2px)}
.copy-btn,.copy-all{
border:none;padding:10px 12px;border-radius:10px;cursor:pointer
}
.copy-all{
width:100%;margin-top:15px;
background:var(--success);color:white;font-weight:700;
display:none;
}
@media(max-width:700px){
.grid,.stats{grid-template-columns:1fr}
h1{font-size:2rem}
.email-row{flex-direction:column;gap:10px;align-items:flex-start}
}
</style>
</head>
<body>
<div class="container">
<div class="topbar">
<button class="toggle" onclick="document.body.classList.toggle('dark')">🌙 Toggle Theme</button>
</div>

<div class="header">
<div class="badge">Made ❤️ by Nexithon Night Shift</div>
<h1>Email Finder Pro</h1>
<p class="subtitle">Generate professional corporate email patterns instantly.</p>
</div>

<div class="card">
<div class="grid">
<div>
<label>First Name</label>
<input id="first" placeholder="John">
</div>
<div>
<label>Last Name</label>
<input id="last" placeholder="Doe">
</div>
<div class="full">
<label>Company Domain</label>
<input id="domain" placeholder="company.com">
</div>
</div>
<button class="btn" onclick="generateEmails()">Generate Email Formats</button>
</div>

<div class="stats" id="stats">
<div class="stat"><h3 id="count">0</h3><small>Formats</small></div>
<div class="stat"><h3>100%</h3><small>Free</small></div>
<div class="stat"><h3>⚡</h3><small>Instant</small></div>
</div>

<div class="results" id="results"></div>
<button class="copy-all" id="copyAll" onclick="copyAllEmails()">Copy All Emails</button>

</div>

<script>
let emailData=[];

function generateFormats(first,last,domain){
const f=first.toLowerCase();
const l=last.toLowerCase();
const fi=f[0];
const li=l[0];
return [
`${f}@${domain}`,
`${l}@${domain}`,
`${f}.${l}@${domain}`,
`${f}${l}@${domain}`,
`${fi}.${l}@${domain}`,
`${fi}${l}@${domain}`,
`${f}${li}@${domain}`,
`${f}_${l}@${domain}`,
`${l}.${f}@${domain}`,
`${l}${f}@${domain}`,
`${li}.${f}@${domain}`,
`${f}-${l}@${domain}`
];
}

function generateEmails(){
const first=document.getElementById('first').value.trim();
const last=document.getElementById('last').value.trim();
const domain=document.getElementById('domain').value.trim().replace(/^https?:\/\//,'');

if(!first||!last||!domain){
alert('Please fill all fields');
return;
}

emailData=generateFormats(first,last,domain);

document.getElementById('stats').style.display='grid';
document.getElementById('count').innerText=emailData.length;

const results=document.getElementById('results');
results.innerHTML='';

emailData.forEach((email,index)=>{
results.innerHTML+=`
<div class="email-row">
<div>${email}</div>
<button class="copy-btn" onclick="copySingle(${index})">Copy</button>
</div>`;
});

document.getElementById('copyAll').style.display='block';
}

function copySingle(i){
navigator.clipboard.writeText(emailData[i]);
}

function copyAllEmails(){
navigator.clipboard.writeText(emailData.join(', '));
const btn=document.getElementById('copyAll');
btn.innerText='✅ Copied All Emails';
setTimeout(()=>btn.innerText='Copy All Emails',2000);
}

document.addEventListener('keypress',e=>{
if(e.key==='Enter') generateEmails();
});
</script>
</body>
</html>
